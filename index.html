        // ============================================================================
        // CORE BLOCK MANAGER & SLASH MENU ENGINE
        // ============================================================================
        class BlockManager {
            constructor(containerId, options) {
                this.container = document.getElementById(containerId);
                this.readOnly = options.readOnly || false;
                this.onChange = options.onChange || function(){};
                this.blocks = []; 
                
                // Slash Menu Setup
                this.slashMenuEl = document.getElementById('slash-menu');
                this.slashActiveBlock = null;
                this.slashSelectedIndex = 0;
                this.slashOptions = [
                    {id: 'map', icon: ICONS.map, name: 'Map Location', keywords: 'map location geography'},
                    {id: 'photo', icon: ICONS.image, name: 'Photo Annotation', keywords: 'photo image picture paint draw'},
                    {id: 'blankCanvas', icon: ICONS.canvas, name: 'Blank Canvas', keywords: 'draw paint sketch blank empty whiteboard'},
                    {id: 'scan', icon: ICONS.scan, name: 'Scan OCR', keywords: 'photo text document read'},
                    {id: 'compute', icon: ICONS.compute, name: 'Compute Logic', keywords: 'math calc logic sum code function'},
                    {id: 'calendar', icon: ICONS.calendar, name: 'Event', keywords: 'date time schedule notify reminder'},
                    {id: 'voice', icon: ICONS.mic, name: 'Voice Memo', keywords: 'audio record memo dictation sound'},
                    {id: 'recall', icon: ICONS.recall, name: 'Recall Database', keywords: 'search find past query historical'}
                ];
                this.slashFiltered = [...this.slashOptions];
                
                this.container.innerHTML = '';
                const dataBlocks = options.data?.blocks || [];
                if (dataBlocks.length === 0 && !this.readOnly) { this.insertBlock('paragraph', {}, 0, false); } 
                else { dataBlocks.forEach((b, i) => this.insertBlock(b.type, b.data, i, false, b.dynamicInfo)); }

                document.addEventListener('click', (e) => { if (!this.slashMenuEl.contains(e.target)) this.hideSlashMenu(); });
            }

            createBlockAPI(instanceId) {
                return {
                    onChange: () => this.onChange(),
                    getIndex: (instance) => { for(let i=0; i<this.blocks.length; i++) { if (this.blocks[i].instance === instance) return i; } return -1; },
                    getBlock: (index) => this.blocks[index],
                    getBlockCount: () => this.blocks.length,
                    insertBlock: (type, data, index, focus) => {
                        const block = this.insertBlock(type, data, index, focus);
                        if (!['paragraph', 'header', 'list', 'checklist', 'quote', 'table'].includes(type) && !this.readOnly) {
                            this.insertBlock('paragraph', {}, index + 1, false);
                        }
                        return block;
                    },
                    deleteBlock: (index) => this.deleteBlock(index),
                    focus: (index) => this.focus(index),
                    showSlashMenu: (block, rect, query) => this.showSlashMenu(block, rect, query),
                    hideSlashMenu: () => this.hideSlashMenu(),
                    isSlashMenuVisible: () => this.slashMenuEl.classList.contains('active'),
                    slashNavigate: (dir) => this.slashNavigate(dir),
                    slashExecute: (block) => this.slashExecute(block)
                };
            }

            showSlashMenu(blockInstance, rect, query) {
                this.slashActiveBlock = blockInstance;
                this.slashMenuEl.style.top = `${rect.bottom + window.scrollY + 5}px`;
                let leftPos = rect.left; if (leftPos < 16) leftPos = 16;
                this.slashMenuEl.style.left = `${leftPos}px`;
                
                this.slashFiltered = this.slashOptions.filter(o => o.name.toLowerCase().includes(query) || o.keywords.includes(query));
                if (this.slashFiltered.length === 0) { this.hideSlashMenu(); return; }
                
                this.slashSelectedIndex = 0; this.renderSlashMenu(); this.slashMenuEl.classList.add('active');
            }

            hideSlashMenu() { this.slashMenuEl.classList.remove('active'); this.slashActiveBlock = null; }

            renderSlashMenu() {
                this.slashMenuEl.innerHTML = '';
                this.slashFiltered.forEach((opt, idx) => {
                    const item = createEl('div', `slash-item ${idx === this.slashSelectedIndex ? 'selected' : ''}`, {}, [createEl('div', '', {innerHTML: opt.icon}), createEl('span', '', {textContent: opt.name})]);
                    item.onmousedown = (e) => { e.preventDefault(); this.slashSelectedIndex = idx; this.slashExecute(this.slashActiveBlock); };
                    this.slashMenuEl.appendChild(item);
                });
            }

            slashNavigate(dir) {
                this.slashSelectedIndex += dir;
                if (this.slashSelectedIndex < 0) this.slashSelectedIndex = this.slashFiltered.length - 1;
                if (this.slashSelectedIndex >= this.slashFiltered.length) this.slashSelectedIndex = 0;
                this.renderSlashMenu();
                const selectedEl = this.slashMenuEl.children[this.slashSelectedIndex];
                if (selectedEl) selectedEl.scrollIntoView({ block: 'nearest' });
            }

            slashExecute(blockInstance) {
                const selected = this.slashFiltered[this.slashSelectedIndex];
                this.hideSlashMenu();
                if (selected && blockInstance) {
                    const idx = this.createBlockAPI().getIndex(blockInstance);
                    this.deleteBlock(idx); 
                    this.insertBlock(selected.id, {}, idx, true);
                    
                    // Guarantee an empty paragraph below the widget so the user isn't stuck
                    if (!this.readOnly) {
                        this.insertBlock('paragraph', {}, idx + 1, false);
                    }
                }
            }

            insertBlock(type, data, index = this.blocks.length, focus = true, dynamicInfo = null) {
                const BlockClass = window.EDITOR_TOOLS[type]; if (!BlockClass) return;

                const blockId = crypto.randomUUID(); const api = this.createBlockAPI(blockId);
                const isBlockReadOnly = this.readOnly || !!dynamicInfo; 
                
                const instance = new BlockClass({ data, api, readOnly: isBlockReadOnly });
                const wrapper = createEl('div', `block-wrapper ${isBlockReadOnly ? 'is-readonly' : ''}`); 
                wrapper.dataset.id = blockId;
                
                // --- Link read-only aggregated block to navigate to original source ---
                if (isBlockReadOnly && dynamicInfo && dynamicInfo.source) {
                    wrapper.onclick = (e) => {
                        // Prevent jumping if interacting with nested components or links
                        if (e.target.closest('a') || e.target.closest('button') || e.target.closest('input') || e.target.closest('.tool-controls')) return;
                        window.loadVirtualPage(dynamicInfo.source);
                    };
                }

                let timeEl = createEl('div', 'block-time');
                if (dynamicInfo) {
                    let dateObj;
                    if (dynamicInfo.timestamp) {
                        dateObj = new Date(dynamicInfo.timestamp);
                    } else {
                        const [y, m, d] = dynamicInfo.source.split('-').map(Number);
                        dateObj = new Date(y, m - 1, d, 12, 0); 
                    }
                    
                    const dateStr = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                    const timeStr = dateObj.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    
                    timeEl = createEl('a', 'block-time v-link', { 
                        textContent: `${dateStr} @ ${timeStr}`, 
                        'data-target': dynamicInfo.source 
                    });
                    timeEl.title = 'Jump to Date';
                    timeEl.onclick = (e) => { e.preventDefault(); window.loadVirtualPage(dynamicInfo.source); };
                } else {
                    if (window.timestamps && window.timestamps[blockId]) {
                        timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    } else if (!this.readOnly && window.timestamps) {
                        window.timestamps[blockId] = Date.now();
                        timeEl.textContent = new Date(window.timestamps[blockId]).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
                    }
                }

                wrapper.append(createEl('div', 'block-content', {}, [instance.render()]), timeEl);
                const blockDef = { id: blockId, type, instance, wrapper, dynamicInfo };
                
                if (index >= this.blocks.length) { this.blocks.push(blockDef); this.container.appendChild(wrapper); } 
                else { this.blocks.splice(index, 0, blockDef); this.container.insertBefore(wrapper, this.container.children[index]); }

                if (focus && typeof instance.focus === 'function' && !isBlockReadOnly) setTimeout(() => instance.focus(), 0);
                this.onChange(); return blockDef;
            }

            deleteBlock(index) {
                if (index < 0 || index >= this.blocks.length) return; const block = this.blocks[index];
                if (typeof block.instance.destroy === 'function') block.instance.destroy();
                block.wrapper.remove(); this.blocks.splice(index, 1);
                if (this.blocks.length === 0 && !this.readOnly) this.insertBlock('paragraph', {}, 0, true);
                this.onChange();
            }

            focus(index) { if (index >= 0 && index < this.blocks.length && typeof this.blocks[index].instance.focus === 'function') { this.blocks[index].instance.focus(); } }
            
            async save() {
                const output = [];
                for (let block of this.blocks) { 
                    if (block.dynamicInfo) continue; // DO NOT SAVE AGGREGATED MENTIONS BACK TO TIMELINE
                    if (typeof block.instance.save === 'function') { 
                        output.push({ id: block.id, type: block.type, data: await block.instance.save() }); 
                    } 
                }
                return { blocks: output };
            }
            
            destroy() { 
                this.hideSlashMenu();
                this.blocks.forEach(b => { if (typeof b.instance.destroy === 'function') b.instance.destroy(); }); 
                this.container.innerHTML = ''; this.blocks = []; 
            }
        }

        // ============================================================================
        // CORE APP LIFECYCLE & ASYNC STORAGE QUEUE
        // ============================================================================
        window.editor = null; 
        window.timestamps = {};
        let saveTimeout;
        let activeSavePromise = Promise.resolve();
        
        let todayStr = getLocalYYYYMMDD(new Date()); 
        window.currentDateStr = todayStr;

        function getDisplayDate(dateStr) { const [y, m, d] = dateStr.split('-'); const date = new Date(y, m - 1, d); return `${date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}<br>${date.toLocaleDateString(undefined, { weekday: 'long' })}`; }

        function executeSave(targetKey = window.currentDateStr) {
            if (!window.editor) return Promise.resolve();
            
            activeSavePromise = activeSavePromise.then(async () => {
                if (!window.editor) return; 
                try {
                    const outputData = await window.editor.save();
                    outputData.timestamps = { ...window.timestamps };
                    await appDB.save(targetKey, outputData);
                    
                    const indicator = document.getElementById('save-indicator');
                    if (indicator && !appDB.isMemoryOnly) { 
                        indicator.classList.add('visible'); 
                        setTimeout(() => indicator.classList.remove('visible'), 1500); 
                    }
                } catch(e) { console.error("Save Error:", e); }
            });
            return activeSavePromise;
        }

        function scheduleSave(immediate = false) {
            if (appDB.isMemoryOnly) return; 
            clearTimeout(saveTimeout);
            const keyToSave = window.currentDateStr;
            if (immediate) { executeSave(keyToSave); } 
            else { saveTimeout = setTimeout(() => { executeSave(keyToSave); }, 800); }
        }

        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') scheduleSave(true); }); 
        window.addEventListener('pagehide', () => scheduleSave(true));
        
        document.getElementById('date-header').onclick = () => {
            scheduleSave(true); 
            let dateToOpen = new Date();
            if (/^\d{4}-\d{2}-\d{2}$/.test(window.currentDateStr)) {
                const [y, m, d] = window.currentDateStr.split('-').map(Number);
                dateToOpen = new Date(y, m - 1, d);
            }
            DatePicker.open(dateToOpen, (selectedDate) => {
                const selectedStr = getLocalYYYYMMDD(selectedDate);
                if (window.currentDateStr !== selectedStr) { window.loadVirtualPage(selectedStr); }
            }, { showTime: false, disableFuture: true, onlyNotes: false }); 
        };

        // ============================================================================
        // VIRTUAL ROUTING
        // ============================================================================
        window.loadVirtualPage = async function(key) {
            const oldStorageKey = window.currentDateStr; 
            
            let storageKey = key;
            let tagParts = [];
            if (key.startsWith('tag-')) {
                const fullTag = key.substring(4);
                tagParts = fullTag.split('.').filter(Boolean);
                storageKey = 'tag-' + tagParts[0]; 
            }
            
            window.currentDateStr = storageKey;
            
            const dateHeader = document.getElementById('date-header');
            const isDate = /^\d{4}-\d{2}-\d{2}$/.test(storageKey);
            
            if (isDate) {
                dateHeader.innerHTML = getDisplayDate(storageKey);
            } else if (storageKey.startsWith('tag-')) {
                dateHeader.innerHTML = '#' + tagParts[0].toUpperCase();
            } else {
                dateHeader.innerHTML = storageKey.toUpperCase();
            }

            await initEditor(storageKey, oldStorageKey, tagParts);
            
            if (tagParts.length > 1) {
                setTimeout(() => {
                    const targetName = tagParts[tagParts.length - 1].toUpperCase();
                    const headers = Array.from(document.querySelectorAll('.native-header-' + tagParts.length));
                    const targetEl = headers.find(h => h.textContent.trim().toUpperCase().startsWith(targetName));
                    if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 150);
            }
        };

        // ============================================================================
        // UNIFIED EDITOR INITIALIZATION (MENTIONS WOVEN DIRECTLY)
        // ============================================================================
        async function initEditor(newStorageKey, oldStorageKey, tagParts = []) {
            if (window.editor) { 
                await executeSave(oldStorageKey); 
                window.editor.destroy(); 
                window.editor = null; 
            }
            
            const isEditable = /^\d{4}-\d{2}-\d{2}$/.test(newStorageKey) ? newStorageKey === todayStr : true; 
            let cachedData = appDB.cache[newStorageKey];
            let editorData = cachedData ? { blocks: JSON.parse(JSON.stringify(cachedData.blocks)), timestamps: {...cachedData.timestamps} } : { blocks: [] };
            
            window.timestamps = editorData.timestamps || {};

            // If it's a Persona Tag Document, dynamically aggregate timeline mentions into the editor state
            if (newStorageKey.startsWith('tag-')) {
                const baseTag = tagParts[0] || newStorageKey.substring(4);
                const days = Object.keys(appDB.cache).filter(k => /^\d{4}-\d{2}-\d{2}$/.test(k)).sort().reverse();
                
                const safeBaseTag = baseTag.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(`(?:^|\\s)#${safeBaseTag}((?:\\.[a-zA-Z0-9_]+)*)\\b`, 'gi');
                
                let mentionsByPath = { '': [] };
                
                days.forEach(day => {
                    const dayData = appDB.cache[day];
                    if (!dayData.blocks) return;
                    dayData.blocks.forEach(b => {
                        let text = b.data.text || '';
                        if (b.data.items) text = b.data.items.map(i => i.text || i.content).join(' ');
                        if (b.data.title) text += ' ' + b.data.title;
                        const cleanText = text.replace(/<[^>]*>?/gm, ' ');
                        
                        let match;
                        let matchedPaths = new Set();
                        regex.lastIndex = 0;
                        while ((match = regex.exec(cleanText)) !== null) {
                            matchedPaths.add(match[1] ? match[1].substring(1).toLowerCase() : '');
                        }
                        matchedPaths.forEach(path => {
                            if (!mentionsByPath[path]) mentionsByPath[path] = [];
                            if (!mentionsByPath[path].some(m => m.block.id === b.id)) {
                                mentionsByPath[path].push({ day, block: b, timestamp: dayData.timestamps?.[b.id] });
                            }
                        });
                    });
                });

                // Guarantee there is at least one editable paragraph at the top for notes
                if (editorData.blocks.length === 0) {
                    editorData.blocks.push({ type: 'paragraph', data: {}, id: crypto.randomUUID() });
                }

                // This maps the H2/H3 headers. 
                // We create them permanently alongside empty paragraphs so the user can easily add standard notes to that section.
                const scaffoldHeading = (path) => {
                    if (!path) {
                        const firstH2Idx = editorData.blocks.findIndex(b => b.type === 'header' && b.data.level === 2);
                        return firstH2Idx !== -1 ? firstH2Idx : editorData.blocks.length; 
                    }
                    
                    const parts = path.split('.');
                    let searchStartIdx = 0;
                    let searchEndIdx = editorData.blocks.length;
                    let currentLevel = 2; // Tag dot extensions start at H2
                    
                    for(let i=0; i<parts.length; i++) {
                        const partName = parts[i].toUpperCase();
                        let existingIdx = -1;
                        
                        // Search for standard, saved user headings that match
                        for (let j = searchStartIdx; j < searchEndIdx; j++) {
                            const b = editorData.blocks[j];
                            if (b.type === 'header' && b.data.level === currentLevel && !b.dynamicInfo) {
                                const text = (b.data.text || '').replace(/<[^>]*>?/gm, '').trim().toUpperCase();
                                if (text === partName || text.startsWith(partName + ' ')) {
                                    existingIdx = j;
                                    break;
                                }
                            }
                        }
                        
                        if (existingIdx !== -1) {
                            // Heading exists! Find the bottom of this specific section.
                            searchStartIdx = existingIdx + 1;
                            let nextHeaderIdx = -1;
                            for (let j = searchStartIdx; j < editorData.blocks.length; j++) {
                                const b = editorData.blocks[j];
                                if (b.type === 'header' && b.data.level <= currentLevel && !b.dynamicInfo) {
                                    nextHeaderIdx = j;
                                    break;
                                }
                            }
                            searchEndIdx = nextHeaderIdx !== -1 ? nextHeaderIdx : editorData.blocks.length;
                        } else {
                            // Creating the heading permanently inside the tag page so notes can be added below it
                            const newId = crypto.randomUUID();
                            editorData.blocks.splice(searchEndIdx, 0, { 
                                type: 'header', 
                                data: { text: partName, level: currentLevel }, 
                                id: newId 
                            });
                            window.timestamps[newId] = Date.now();
                            
                            // Injecting an empty, editable paragraph specifically for user to type notes
                            const pId = crypto.randomUUID();
                            editorData.blocks.splice(searchEndIdx + 1, 0, { 
                                type: 'paragraph', 
                                data: {}, 
                                id: pId 
                            });
                            window.timestamps[pId] = Date.now();

                            searchStartIdx = searchEndIdx + 2;
                            searchEndIdx = searchEndIdx + 2;
                        }
                        currentLevel++;
                    }
                    return searchEndIdx; // Dynamic mentions will be appended right here (the bottom of the section)
                };

                // Insert all found mentions seamlessly as standard text blocks into the document
                Object.keys(mentionsByPath).sort().forEach(path => {
                    let insertIdx = scaffoldHeading(path);
                    mentionsByPath[path].sort((a,b) => {
                        const tA = a.timestamp || new Date(a.day).getTime();
                        const tB = b.timestamp || new Date(b.day).getTime();
                        return tB - tA; // Chronological order inside the section
                    }).forEach(m => {
                        const blockClone = JSON.parse(JSON.stringify(m.block));
                        blockClone.dynamicInfo = { source: m.day, timestamp: m.timestamp };
                        blockClone.id = 'dyn-' + crypto.randomUUID();
                        editorData.blocks.splice(insertIdx, 0, blockClone);
                        insertIdx++;
                    });
                });
            }

            window.editor = new BlockManager('editor-container', { 
                readOnly: !isEditable, 
                data: editorData, 
                onChange: () => { if (isEditable) scheduleSave(); } 
            });
        }

        appDB.init().then(() => { window.loadVirtualPage(window.currentDateStr); });
    </script>
</body>
</html>
